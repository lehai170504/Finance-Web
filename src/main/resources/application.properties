# ===============================================================
# DATABASE CONFIGURATION (Supabase / Production)
# ===============================================================
# These variables will be injected by Render Environment Variables
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/financedb}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:123456}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.orm.jdbc.bind=trace
spring.jpa.open-in-view=false
# ===============================================================
# SERVER CONFIGURATION
# ===============================================================
# Dynamic port for Deployment (Defaults to 8080)
server.port=${PORT:8080}

# DevTools for faster development
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

